name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Run offline evaluation pipeline
        run: python pipelines/evaluate_default.py

      - name: Run training placeholder
        run: python pipelines/train_placeholder.py

      - name: Build Docker image
        run: docker build -t review-insights-poc:ci .
